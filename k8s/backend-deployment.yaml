apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: cafe-grao-backend:latest
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              value: cafe_grao
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000