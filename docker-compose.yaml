services:
  postgres:
    image: postgres:15-alpine
    container_name: cafe_grao_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cafe_grao_network

  backend:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - cafe_grao_network
    build:
      context: ./back-end
      dockerfile: DockerFile
    container_name: cafe_grao_backend
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${BACKEND_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./back-end/logs:/app/logs
      - ./back-end/data:/app/data
    command: node server.js
    restart: unless-stopped

  frontend:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    build:
      context: ./front-end
      dockerfile: DockerFile
    container_name: cafe_grao_frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - cafe_grao_network
    restart: unless-stopped

networks:
  cafe_grao_network:
    driver: bridge

volumes:
  pgdata: